inherit_gem:
  rubocop-legion: config/lex.yml

# StateTracker/AlertDedup/CheckHistory use class-level Mutex+hash singletons — intentional mutable pattern
ThreadSafety/ClassInstanceVariable:
  Enabled: false

ThreadSafety/MutableClassInstanceVariable:
  Enabled: false

# Private helper methods return early with nil — not public runner return values
Legion/Extension/RunnerReturnHash:
  Enabled: false
